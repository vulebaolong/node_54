name: cd

on:
    workflow_run: 
        workflows: ["ci"]
        types: 
            - completed

jobs:
    start:
        runs-on: node_54

        steps:
            - name: Dừng container BE
              run: sudo docker container stop con-email_dc

            - name: Xoá container BE
              run: sudo docker container remove con-email_dc

            - name: Xoá image BE
              run: sudo docker image remove vulebaolong/img-email:latest

            - name: Chạy lại source
              working-directory: /home/ubuntu/nestjs
              run: sudo docker compose up -d